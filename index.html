<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SafePath - Women Safety Route Planner</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Intro Screen -->
<div id="introScreen">
    <h1>🚺 SafePath</h1>
    <p>Smart Route Planning for Women's Safety</p>
</div>

<h2>Women Safety Smart Route Planner</h2>

<div class="controls">
    <button onclick="drawRoute()">Find Safe Route</button>
    <button onclick="triggerSOS()" style="background:red;">SOS</button>

</div>

        <div id="riskBox" class="info-card">
            <h3>Safety Score: <span id="riskValue">0</span></h3>
            <p id="riskStatus">Status: Safe</p>
        </div>

        <div id="legend" class="info-card small">
            <p><span class="dot safe"></span> Safe</p>
            <p><span class="dot medium"></span> Medium Risk</p>
            <p><span class="dot high"></span> High Risk</p>
        </div>

        <footer class="panel-foot">
            <small>Tip: enter coordinates like <em>17.385044,78.486671</em> or a full address.</small>
        </footer>
    </aside>

    <section class="map-area">
        <div id="map"></div>
    </section>
</main>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
